specVersion: v0.1.0
package:
  name: aerodrome_sink_sql
  version: v0.1.0
  url: https://github.com/PaulieB14/substreams-sink-sql-js
  description: Aerodrome Finance SQL Sink for PostgreSQL

imports:
  spkg: ./aerodrome-substreams-fixed.spkg
  sql: https://github.com/streamingfast/substreams-sink-sql/releases/download/protodefs-v1.0.7/substreams-sink-sql-protodefs-v1.0.7.spkg

modules:
  - name: db_out
    use: spkg:db_out

sink:
  module: db_out
  type: sf.substreams.sink.sql.v1.Service
  config:
    schema: "./schema.sql"
    engine: postgres
    postgraphile_frontend:
      enabled: false

network: base
