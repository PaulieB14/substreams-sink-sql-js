specVersion: v0.1.0
package:
  name: substreams_sink_sql
  version: v0.1.0
  url: https://github.com/PaulieB14/substreams-sink-sql-js
  description: Substreams SQL Sink for PostgreSQL

# Import your Substreams .spkg that outputs DatabaseChanges
# Replace with your own .spkg file or URL
imports:
  spkg: https://spkg.io/streamingfast/substreams-eth-block-meta-v0.4.3.spkg

modules:
  - name: db_out
    use: spkg:db_out

sink:
  module: db_out
  type: sf.substreams.sink.sql.v1.Service
  config:
    schema: "./schema.sql"
    engine: postgres
    postgraphile_frontend:
      enabled: false

network: mainnet
